    <style>
    body {
        font-family: Arial;
        text-align: center;
        background: #f5f5f5;
        margin: 0;
        padding: 10px;
    }

    h2 {
        margin-top: 15px;
        font-size: 20px;
    }

    input {
        margin: 10px 5px;
        width: 90%;
        max-width: 300px;
    }

    button {
        padding: 8px 14px;
        cursor: pointer;
        border-radius: 6px;
        border: none;
        background: #007bff;
        color: white;
        margin: 5px;
    }

    button:hover {
        opacity: 0.9;
    }

    .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 10px;
        padding: 10px;
    }

    .card {
        padding: 8px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
    }

    .card img,
    .card video {
        width: 100%;
        height: auto;
        border-radius: 6px;
    }

    .card button {
        width: 100%;
        margin-top: 5px;
        font-size: 12px;
    }

    .card button:first-of-type {
        background: #28a745;
    }

    .card button:last-of-type {
        background: red;
    }

    /* 📱 Extra mobile optimization */
    @media (max-width: 480px) {
        h2 {
            font-size: 18px;
        }

        button {
            width: 100%;
        }
    }
</style>


</head>

<body>

    ```
    <h2>Upload Image / Video</h2>

    <input type="file" id="fileInput" accept="image/*,video/*">
    <button onclick="uploadFile()">Upload</button>

    <h2>Gallery</h2>
    <div class="gallery" id="gallery"></div>

    <script>
        const API = "http://localhost:5000";

        async function uploadFile() {
            const file = document.getElementById("fileInput").files[0];

            if (!file) {
                alert("Please select a file");
                return;
            }

            const formData = new FormData();
            formData.append("file", file);

            try {
                await fetch(API + "/upload", {
                    method: "POST",
                    body: formData
                });

                alert("Upload successful");
                loadFiles();

            } catch (err) {
                alert("Upload failed");
                console.error(err);
            }
        }

        async function loadFiles() {
            const res = await fetch(API + "/files");
            const files = await res.json();

            const gallery = document.getElementById("gallery");
            gallery.innerHTML = "";

            files.forEach(file => {
                const isVideo = file.key.match(/\.(mp4|webm|ogg)$/i);

                const div = document.createElement("div");
                div.className = "card";

                const safeUrl = encodeURI(file.url); // ✅ IMPORTANT FIX

                div.innerHTML = `
                ${isVideo
                        ? `<video src="${safeUrl}" controls></video>`
                        : `<img src="${safeUrl}" />`
                    }
                <button onclick="downloadFile('${file.key}')">Download</button>
                <button onclick="deleteFile('${file.key}')">Delete</button>
            `;

                gallery.appendChild(div);
            });
        }

        async function deleteFile(key) {
            const confirmDelete = confirm("Delete this file?");
            if (!confirmDelete) return;

            try {
                await fetch(`${API}/delete?key=${encodeURIComponent(key)}`, {
                    method: "DELETE"
                });

                loadFiles();

            } catch (err) {
                alert("Delete failed");
                console.error(err);
            }
        }

        // async function downloadFile(key) {
        //     const url = `${API}/file?key=${encodeURIComponent(key)}`;

        //     const a = document.createElement("a");
        //     a.href = url;
        //     a.download = key; // file name
        //     document.body.appendChild(a);
        //     a.click();
        //     document.body.removeChild(a);
        // }

        function downloadFile(key) {
            window.open(`${API}/file?key=${encodeURIComponent(key)}&download=true`);
        }
        loadFiles();
    </script>
