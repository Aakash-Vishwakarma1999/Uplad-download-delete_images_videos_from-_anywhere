    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
            margin: 0;
            padding: 10px;
        }

        h2 {
            margin-top: 15px;
            font-size: 20px;
        }

        input {
            margin: 10px 5px;
            width: 90%;
            max-width: 300px;
        }

        button {
            padding: 8px 14px;
            cursor: pointer;
            border-radius: 6px;
            border: none;
            background: #007bff;
            color: white;
            margin: 5px;
        }

        button:hover {
            opacity: 0.9;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            padding: 10px;
        }

        .card {
            padding: 8px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        }

        .card img,
        .card video {
            width: 100%;
            height: auto;
            border-radius: 6px;
        }

        .card button {
            width: 100%;
            margin-top: 5px;
            font-size: 12px;
        }

        .card button:first-of-type {
            background: #28a745;
        }

        .card button:last-of-type {
            background: red;
        }

        /* 📱 Extra mobile optimization */
        @media (max-width: 480px) {
            h2 {
                font-size: 18px;
            }

            button {
                width: 100%;
            }
        }
    </style>


</head>

        function uploadFile() {
            const input = document.getElementById("fileInput");
            const files = input.files;

            if (!files || files.length === 0) {
                alert("Please select files");
                return;
            }

            const formData = new FormData();

            for (let i = 0; i < files.length; i++) {
                formData.append("files", files[i]);
            }

            const xhr = new XMLHttpRequest();

            xhr.open("POST", API + "/upload", true);

            // ✅ Show progress container
            const progressContainer = document.getElementById("progressContainer");
            const progressBar = document.getElementById("progressBar");

            progressContainer.style.display = "block";

            // ✅ Track upload progress
            xhr.upload.onprogress = function (e) {
                if (e.lengthComputable) {
                    const percent = Math.round((e.loaded / e.total) * 100);
                    progressBar.style.width = percent + "%";
                    progressBar.innerText = percent + "%";
                }
            };

            // ✅ On success
            xhr.onload = function () {
                if (xhr.status === 200) {
                    progressBar.style.width = "100%";
                    progressBar.innerText = "Upload Complete 🎉";

                    setTimeout(() => {
                        progressContainer.style.display = "none";
                        progressBar.style.width = "0%";
                        progressBar.innerText = "0%";
                    }, 1500);

                    loadFiles();
                } else {
                    alert("Upload failed");
                }
            };

            // ❌ On error
            xhr.onerror = function () {
                alert("Upload error");
            };

            xhr.send(formData);
        }




        async function loadFiles() {
            const res = await fetch(API + "/files");
            const files = await res.json();

            const gallery = document.getElementById("gallery");
            gallery.innerHTML = "";

            files.forEach(file => {
                const isVideo = file.key.match(/\.(mp4|webm|ogg)$/i);

                const div = document.createElement("div");
                div.className = "card";

                const safeUrl = encodeURI(file.url); // ✅ IMPORTANT FIX

                div.innerHTML = `
                ${isVideo
                        ? `<video src="${safeUrl}" controls></video>`
                        : `<img src="${safeUrl}" />`
                    }
                <button onclick="downloadFile('${file.key}')">Download</button>
                <button onclick="deleteFile('${file.key}')">Delete</button>
            `;

                gallery.appendChild(div);
            });
        }

        async function deleteFile(key) {
            const confirmDelete = confirm("Delete this file?");
            if (!confirmDelete) return;

            try {
                await fetch(`${API}/delete?key=${encodeURIComponent(key)}`, {
                    method: "DELETE"
                });

                loadFiles();

            } catch (err) {
                alert("Delete failed");
                console.error(err);
            }
        }

        function downloadFile(key) {
            window.open(`${API}/file?key=${encodeURIComponent(key)}&download=true`);
        }
        loadFiles();
